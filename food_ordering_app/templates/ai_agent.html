{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
    <div style="background: #111; color: #fff; padding: 20px; display: flex; align-items: center; gap: 10px;">
        <div style="width: 30px; height: 30px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center;">✨</div>
        <div>
            <h2 style="margin: 0; font-size: 18px;">Swifty AI Assistant</h2>
            <p style="margin: 0; font-size: 12px; color: #aaa;">Agentic NLP Beta</p>
        </div>
    </div>

    <div id="chat-window" style="height: 400px; background: #f9fafb; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;">
        <div style="align-self: flex-start; background: #fff; border: 1px solid #ddd; padding: 12px; border-radius: 15px; border-top-left-radius: 0; max-width: 80%; font-size: 14px;">
            Hi! I'm Swifty's AI agent. What are you craving today? (e.g., "Find me a Burger under ₹200")
        </div>
    </div>

    <div style="padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px;">
        <input type="text" id="ai-input" placeholder="Type your craving..." style="flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none;" onkeypress="if(event.key === 'Enter') sendAIMessage()">
        <button onclick="sendAIMessage()" style="background: #111; color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer;">➤</button>
    </div>
</div>

<script>
function sendAIMessage() {
    const input = document.getElementById('ai-input');
    const text = input.value.trim();
    if(!text) return;

    const chatWindow = document.getElementById('chat-window');
    
    // User Message
    chatWindow.innerHTML += `
        <div style="align-self: flex-end; background: #3b82f6; color: #fff; padding: 12px; border-radius: 15px; border-top-right-radius: 0; max-width: 80%; font-size: 14px;">
            ${text}
        </div>
    `;
    input.value = '';
    chatWindow.scrollTop = chatWindow.scrollHeight;

    // Simulate AI Processing Network Request
    setTimeout(() => {
        chatWindow.innerHTML += `
            <div style="align-self: flex-start; background: #e0f2fe; color: #0c4a6e; border: 1px solid #bae6fd; padding: 12px; border-radius: 15px; border-top-left-radius: 0; max-width: 80%; font-size: 14px;">
                I've optimized your search parameters across our restaurant network. I found exactly what you need at Behrouz Biryani! Would you like me to auto-create a cart? 🍔
            </div>
        `;
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }, 1500);
}
</script>
{% endblock %}
